<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscripción a un taller técnico</title>
</head>
<body>
    <form action="" method="post">
    <label for="full-name">Nombre completo</label>
    <input id="full-name" name="fullName" type="text">
    
    <label for="email">Correo electrónico</label>
    <input id="email" name="email" type="email">
    
    <label for="number">Número de Teléfono</label>
    <input type="tel" name="telUsuario" id="number">
    
    <label for="fecha">Fecha preferida</label>
    <input type="date" name="fecha" id="fecha">

    <label for="mensaje">Mensaje breve (dudas)</label>
    <textarea name="mensaje" id="mensaje" cols="10" rows="3"></textarea>
    
    
    </form>
</body>
</html>
