<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Crear cuenta de alumno</title>
</head>
<body>

    <main>
        <h1>Crear cuenta de alumno</h1>

        <form action="/registro" method="POST">
            
            <p>
                <label for="username">Nombre de usuario:</label><br>
                <input 
                    type="text" 
                    id="username" 
                    name="username" 
                    required 
                    minlength="4" 
                    maxlength="9" 
                    placeholder="De 4 a 9 caracteres">
            </p>

            <p>
                <label for="email">Correo electrónico:</label><br>
                <input 
                    type="email" 
                    id="email" 
                    name="email" 
                    required 
                    placeholder="usuario@ejemplo.com">
            </p>

            <p>
                <label for="password">Contraseña:</label><br>
                <input 
                    type="password" 
                    id="password" 
                    name="password" 
                    required 
                    minlength="8">
            </p>

            <p>
                <label for="age">Edad:</label><br>
                <input 
                    type="number" 
                    id="age" 
                    name="age" 
                    min="16" 
                    max="99" 
                    required>
            </p>

            <p>
                <label for="portfolio">Portfolio o perfil profesional:</label><br>
                <input 
                    type="url" 
                    id="portfolio" 
                    name="portfolio" 
                    placeholder="https://tuweb.com">
            </p>

            <p>
                <input 
                    type="checkbox" 
                    id="terms" 
                    name="terms" 
                    required>
                <label for="terms">Acepto los términos y condiciones de uso</label>
            </p>

            <button type="submit">Registrarse ahora</button>

        </form>
    </main>

</body>
</html>
